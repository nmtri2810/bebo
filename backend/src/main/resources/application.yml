spring:
  application:
    name: bebo-backend

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/bebo}
    username: ${DATABASE_USERNAME:bebo}
    password: ${DATABASE_PASSWORD:bebo}

  jpa:
    open-in-view: false

    hibernate:
      ddl-auto: validate

    properties:
      hibernate:
        jdbc:
          "[time_zone]": UTC

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info

  endpoint:
    health:
      probes:
        enabled: true

bebo:
  jwt:
    issuer: ${JWT_ISSUER:bebo-backend}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:PT24H}
    secret: ${JWT_SECRET:YmViby1kZXYtc2VjcmV0LW11c3QtYmUtYXQtbGVhc3QtMzItYnl0ZXM=}

  cors:
    allowed-origins:
      - ${FRONTEND_URL:http://localhost:3000}

  telegram:
    bot-token: ${TELEGRAM_BOT_TOKEN:}
    bot-username: ${TELEGRAM_BOT_USERNAME:}
    webhook-secret: ${TELEGRAM_WEBHOOK_SECRET:}
